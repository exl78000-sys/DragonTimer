<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#101010" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <title>龍王計時器 WebApp</title>
  <style>
    :root{--bg:#101010;--panel:#181818;--green:#00ff66;--red:#ff3333;--muted:#8cffb5;}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{margin:0;background:var(--bg);color:var(--green);font-family:-apple-system,BlinkMacSystemFont,"Microsoft JhengHei",sans-serif;min-height:100vh;padding:18px}
    .app{max-width:520px;margin:0 auto}
    h1{text-align:center;font-size:26px;margin:8px 0 10px}.mode{text-align:center;font-size:18px;font-weight:700;margin-bottom:12px}.grid{display:grid;grid-template-columns:1fr;gap:12px}.card{background:var(--panel);border:1px solid #244;border-radius:18px;padding:16px;text-align:center;box-shadow:0 8px 22px rgba(0,0,0,.28)}.title{font-size:18px;color:var(--muted)}.main{font-size:38px;font-weight:800;margin:6px 0}.time{font-size:30px;font-weight:800}.warn{color:var(--red)!important}.buttons{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:14px}.buttons.five{grid-template-columns:repeat(5,1fr)}button{border:1px solid #2b6;background:#15251c;color:var(--green);border-radius:14px;padding:13px 8px;font-size:17px;font-weight:700}button:active{transform:scale(.98);background:#1f3a2a}.wide{grid-column:span 2}.small{font-size:13px;line-height:1.55;color:var(--muted);text-align:left;margin-top:14px;white-space:pre-line}.activeMode{background:#245c3a}.install{display:none;margin:10px 0 0;width:100%}@media (min-width:640px){.grid{grid-template-columns:1fr 1fr}.card.step{grid-column:span 2}.buttons.five{grid-template-columns:repeat(5,1fr)}}
  </style>
</head>
<body>
  <main class="app">
    <h1>龍王計時器</h1>
    <div id="modeLabel" class="mode">語音模式：全</div>
    <button id="installBtn" class="install">安裝到主畫面</button>

    <section class="grid">
      <div class="card step">
        <div class="title">踩踏</div>
        <div id="stepName" class="main">未啟用</div>
        <div id="stepTime" class="time">--</div>
      </div>
      <div class="card">
        <div class="title">消技</div>
        <div id="skillTime" class="time">未啟用</div>
      </div>
      <div class="card">
        <div class="title">黑鎖</div>
        <div id="lockTime" class="time">未啟用</div>
      </div>
    </section>

    <div class="buttons five">
      <button id="mLU">左上</button><button id="mLD">左下</button><button id="mRU">右上</button><button id="mRD">右下</button><button id="mALL" class="activeMode">全</button>
    </div>

    <div class="buttons">
      <button onclick="resetStep()">重置踩踏</button>
      <button onclick="stopStep()">停止踩踏</button>
      <button onclick="resetSkill()">重置消技</button>
      <button onclick="stopSkill()">停止消技</button>
      <button onclick="resetLock()">重置黑鎖</button>
      <button onclick="stopLock()">停止黑鎖</button>
      <button class="wide" onclick="stopAll()">停止全部</button>
      <button class="wide" onclick="testVoice()">語音測試 / 啟用聲音</button>
    </div>

    <div class="card small">【手機/iPad 操作】
左上：只聽左重踩
左下：只聽左重踩
右上：只聽右重踩
右下：只聽右輕踩
全：全部提示

踩踏 10 秒循環，消技 90 秒，黑鎖 32 秒。
倒數 3 秒紅字並發聲；切換時不發聲。</div>
  </main>
<script>
const STEPS=["左輕踩","左重踩","右輕踩","右重踩"];
const STEP_SECONDS=10, SKILL_SECONDS=90, LOCK_SECONDS=32;
const MODES={"左上":new Set(["左重踩","消技","黑鎖"]),"左下":new Set(["左重踩","消技","黑鎖"]),"右上":new Set(["右重踩","消技","黑鎖"]),"右下":new Set(["右輕踩","消技","黑鎖"]),"全":null};
let mode="全", stepActive=false, skillActive=false, lockActive=false;
let stepIndex=0, stepRemain=STEP_SECONDS, skillRemain=SKILL_SECONDS, lockRemain=LOCK_SECONDS;
let stepWarn=false, skillWarn=false, lockWarn=false;
let deferredPrompt=null;

function speak(text){
  if(!text) return;
  const allowed=MODES[mode];
  const parts=text.split("，").filter(t=>!allowed || allowed.has(t));
  if(!parts.length) return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(parts.join("，"));
  u.lang="zh-TW"; u.rate=1.15; u.volume=1;
  const voices=speechSynthesis.getVoices();
  const zh=voices.find(v=>/zh|Chinese|Taiwan|Han|Hui|Yaoyao/i.test(v.lang+v.name));
  if(zh) u.voice=zh;
  speechSynthesis.speak(u);
}
function testVoice(){ speak("語音測試"); }
function setMode(m){mode=m; document.getElementById('modeLabel').textContent='語音模式：'+m; ['mLU','mLD','mRU','mRD','mALL'].forEach(id=>document.getElementById(id).classList.remove('activeMode')); ({左上:'mLU',左下:'mLD',右上:'mRU',右下:'mRD',全:'mALL'}[m]&&document.getElementById({左上:'mLU',左下:'mLD',右上:'mRU',右下:'mRD',全:'mALL'}[m]).classList.add('activeMode'));}
document.getElementById('mLU').onclick=()=>setMode('左上');document.getElementById('mLD').onclick=()=>setMode('左下');document.getElementById('mRU').onclick=()=>setMode('右上');document.getElementById('mRD').onclick=()=>setMode('右下');document.getElementById('mALL').onclick=()=>setMode('全');
function resetStep(){stepActive=true;stepIndex=0;stepRemain=STEP_SECONDS;stepWarn=false;render();}
function resetSkill(){skillActive=true;skillRemain=SKILL_SECONDS;skillWarn=false;render();}
function resetLock(){lockActive=true;lockRemain=LOCK_SECONDS;lockWarn=false;render();}
function stopStep(){stepActive=false;render();} function stopSkill(){skillActive=false;render();} function stopLock(){lockActive=false;render();}
function stopAll(){stepActive=false;skillActive=false;lockActive=false;render();}
function tick(){let reminders=[]; if(stepActive){stepRemain--; if(stepRemain===3&&!stepWarn){stepWarn=true;reminders.push(STEPS[stepIndex]);} if(stepRemain<=0){stepIndex=(stepIndex+1)%STEPS.length;stepRemain=STEP_SECONDS;stepWarn=false;}}
if(skillActive){skillRemain--; if(skillRemain===3&&!skillWarn){skillWarn=true;reminders.push('消技');} if(skillRemain<=0){skillRemain=SKILL_SECONDS;skillWarn=false;}}
if(lockActive){lockRemain--; if(lockRemain===3&&!lockWarn){lockWarn=true;reminders.push('黑鎖');} if(lockRemain<=0){lockRemain=LOCK_SECONDS;lockWarn=false;}}
if(reminders.length) speak([...new Set(reminders)].join('，')); render();}
function setWarn(el,on){el.classList.toggle('warn',!!on)}
function render(){const sn=document.getElementById('stepName'), st=document.getElementById('stepTime'), sk=document.getElementById('skillTime'), lk=document.getElementById('lockTime'); if(stepActive){sn.textContent=STEPS[stepIndex];st.textContent=String(stepRemain).padStart(2,'0'); setWarn(sn,stepRemain<=3);setWarn(st,stepRemain<=3);}else{sn.textContent='未啟用';st.textContent='--';setWarn(sn,false);setWarn(st,false);} if(skillActive){sk.textContent=String(skillRemain).padStart(2,'0');setWarn(sk,skillRemain<=3);}else{sk.textContent='未啟用';setWarn(sk,false);} if(lockActive){lk.textContent=String(lockRemain).padStart(2,'0');setWarn(lk,lockRemain<=3);}else{lk.textContent='未啟用';setWarn(lk,false);}}
setInterval(tick,1000); render();
if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(()=>{});}
window.addEventListener('beforeinstallprompt', e=>{e.preventDefault();deferredPrompt=e;const b=document.getElementById('installBtn');b.style.display='block';b.onclick=async()=>{deferredPrompt.prompt();deferredPrompt=null;b.style.display='none';};});
</script>
</body>
</html>
