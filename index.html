<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#101010" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="龍王計時器" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <title>龍王計時器 WebApp v2.2</title>
  <style>
    :root {
      --bg:#101010; --panel:#181818; --text:#00ff66; --muted:#83d99f;
      --warn:#ff3333; --accent:#f0c84b; --border:#245c34; --button:#163620;
    }
    body.light {
      --bg:#f7faf7; --panel:#ffffff; --text:#087a31; --muted:#3b7d51;
      --warn:#d71920; --accent:#d5a500; --border:#b7d8c0; --button:#e8f5ec;
    }
    * { box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin:0; min-height:100%; background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC","Microsoft JhengHei",sans-serif; }
    body { padding: max(14px, env(safe-area-inset-top)) 14px max(18px, env(safe-area-inset-bottom)); }
    .app { max-width: 560px; margin:0 auto; }
    header { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:10px; }
    h1 { font-size:24px; margin:0; letter-spacing:.04em; }
    .pill { border:1px solid var(--border); background:var(--panel); color:var(--text); border-radius:999px; padding:8px 12px; font-weight:700; }
    .top-controls { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin:10px 0 12px; }
    button, input[type="range"] { font:inherit; }
    button { border:1px solid var(--border); background:var(--button); color:var(--text); border-radius:14px; padding:12px 10px; font-weight:800; cursor:pointer; }
    button:active, .card:active { transform:scale(.985); }
    button.active { outline:2px solid var(--accent); color:var(--accent); }
    .control-card { border:1px solid var(--border); background:var(--panel); border-radius:18px; padding:12px; margin-bottom:10px; }
    .row { display:flex; align-items:center; justify-content:space-between; gap:12px; }
    .small { color:var(--muted); font-size:13px; }
    .slider-wrap { display:grid; grid-template-columns:auto 1fr auto; gap:8px; align-items:center; margin-top:8px; }
    input[type="range"] { width:100%; accent-color:var(--text); }
    .cards { display:grid; gap:10px; }
    .timer-row { display:grid; grid-template-columns:1fr 86px; gap:8px; align-items:stretch; }
    .card { border:2px solid var(--border); background:var(--panel); border-radius:22px; padding:18px 16px; text-align:center; user-select:none; transition: background .12s, border-color .12s, transform .05s; }
    .card.flash { border-color:var(--accent); background: color-mix(in srgb, var(--accent) 18%, var(--panel)); }
    .side-stop { height:100%; min-height:124px; border-radius:20px; padding:8px 6px; font-size:16px; line-height:1.25; display:flex; align-items:center; justify-content:center; writing-mode:vertical-rl; letter-spacing:.1em; }
    .label { font-size:17px; color:var(--muted); font-weight:800; }
    .main { font-size:30px; line-height:1.15; font-weight:900; margin-top:6px; }
    .time { font-size:56px; line-height:1; font-weight:1000; margin-top:8px; font-variant-numeric: tabular-nums; }
    .warning .label, .warning .main, .warning .time { color:var(--warn); }
    .modes { display:grid; grid-template-columns:repeat(5,1fr); gap:7px; margin-top:12px; }
    .actions { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:10px; }
    .actions .full { grid-column:1 / -1; }
    .help { white-space:pre-line; font-size:13px; color:var(--muted); line-height:1.45; margin-top:12px; padding:12px; border:1px dashed var(--border); border-radius:16px; }
    .wake-on { color:var(--accent); }
    @supports not (color: color-mix(in srgb, red, blue)) { .card.flash { background:var(--button); } }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>龍王計時器</h1>
      <div class="pill" id="modeText">模式：全</div>
    </header>

    <div class="top-controls">
      <button id="themeBtn">🌙 深色</button>
      <button id="wakeBtn">螢幕常亮：ON</button>
    </div>

    <div class="control-card">
      <div class="row">
        <strong>音量</strong>
        <span id="volumeText">80%</span>
      </div>
      <div class="slider-wrap">
        <span>🔈</span>
        <input id="volume" type="range" min="0" max="100" value="80" />
        <span>🔊</span>
      </div>
      <div class="small" id="wakeStatus">防止螢幕熄滅：準備中</div>
    </div>

    <section class="cards">
      <div class="timer-row">
        <div class="card" id="stepCard" role="button" tabindex="0" aria-label="重置踩踏">
          <div class="label">踩踏｜點擊重置</div>
          <div class="main" id="stepName">未啟用</div>
          <div class="time" id="stepTime">--</div>
        </div>
        <button class="side-stop" id="stopStepBtn" aria-label="停止踩踏">停止</button>
      </div>

      <div class="timer-row">
        <div class="card" id="skillCard" role="button" tabindex="0" aria-label="重置消技">
          <div class="label">消技｜點擊重置</div>
          <div class="time" id="skillTime">--</div>
        </div>
        <button class="side-stop" id="stopSkillBtn" aria-label="停止消技">停止</button>
      </div>

      <div class="timer-row">
        <div class="card" id="lockCard" role="button" tabindex="0" aria-label="重置黑鎖">
          <div class="label">黑鎖｜點擊重置</div>
          <div class="time" id="lockTime">--</div>
        </div>
        <button class="side-stop" id="stopLockBtn" aria-label="停止黑鎖">停止</button>
      </div>
    </section>

    <div class="modes">
      <button data-mode="左上">左上</button>
      <button data-mode="左下">左下</button>
      <button data-mode="右上">右上</button>
      <button data-mode="右下">右下</button>
      <button data-mode="全" class="active">全</button>
    </div>

    <div class="actions">
      <button id="testVoiceBtn">語音測試</button>
      <button id="stopAllBtn">停止全部</button>
    </div>

    <div class="help">操作說明
・點踩踏 / 消技 / 黑鎖區塊：立即重置並啟用（不額外顯示設定秒數）
・點右側「停止」：停止該項計時
・剩 3 秒：紅字 + 語音提醒
・語音模式：左上/左下只聽左重踩，右上只聽右重踩，右下只聽右輕踩，全模式全部都聽
・iPhone/iPad 可用 Safari 分享 → 加入主畫面</div>
  </div>

<script>
(() => {
  const STEPS = ["左輕踩", "左重踩", "右輕踩", "右重踩"];
  const STEP_SECONDS = 10, SKILL_SECONDS = 90, LOCK_SECONDS = 32;
  const filters = { "全": null, "左上": new Set(["左重踩"]), "左下": new Set(["左重踩"]), "右上": new Set(["右重踩"]), "右下": new Set(["右輕踩"]) };

  const $ = id => document.getElementById(id);
  const state = {
    mode: localStorage.getItem("dt_mode") || "全",
    theme: localStorage.getItem("dt_theme") || "dark",
    volume: Number(localStorage.getItem("dt_volume") || 80),
    wakeEnabled: localStorage.getItem("dt_wake") !== "off",
    stepActive:false, skillActive:false, lockActive:false,
    stepIndex:0, stepRemaining:STEP_SECONDS, skillRemaining:SKILL_SECONDS, lockRemaining:LOCK_SECONDS,
    stepWarned:false, skillWarned:false, lockWarned:false,
    lastTick: Date.now(), wakeLock:null
  };

  function applyTheme() {
    document.body.classList.toggle("light", state.theme === "light");
    $("themeBtn").textContent = state.theme === "light" ? "☀️ 淺色" : "🌙 深色";
    document.querySelector('meta[name="theme-color"]').setAttribute("content", state.theme === "light" ? "#f7faf7" : "#101010");
    localStorage.setItem("dt_theme", state.theme);
  }

  function setMode(mode) {
    state.mode = mode;
    localStorage.setItem("dt_mode", mode);
    $("modeText").textContent = "模式：" + mode;
    document.querySelectorAll(".modes button").forEach(btn => btn.classList.toggle("active", btn.dataset.mode === mode));
  }

  function canSpeak(text) {
    if (text === "消技" || text === "黑鎖") return true;
    const allowed = filters[state.mode];
    return !allowed || allowed.has(text);
  }

  function speakMany(items) {
    const texts = [...new Set(items.filter(Boolean).filter(canSpeak))];
    if (!texts.length) return;
    const text = texts.join("，");
    try {
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = "zh-TW";
      u.volume = Math.max(0, Math.min(1, state.volume / 100));
      u.rate = 1.05;
      window.speechSynthesis.speak(u);
    } catch (e) {}
  }

  function flash(el) {
    el.classList.add("flash");
    setTimeout(() => el.classList.remove("flash"), 180);
  }

  function resetStep() {
    state.stepActive = true; state.stepIndex = 0; state.stepRemaining = STEP_SECONDS; state.stepWarned = false; flash($("stepCard")); render(); requestWakeLock();
  }
  function resetSkill() {
    state.skillActive = true; state.skillRemaining = SKILL_SECONDS; state.skillWarned = false; flash($("skillCard")); render(); requestWakeLock();
  }
  function resetLock() {
    state.lockActive = true; state.lockRemaining = LOCK_SECONDS; state.lockWarned = false; flash($("lockCard")); render(); requestWakeLock();
  }
  function stopAll() { state.stepActive = state.skillActive = state.lockActive = false; render(); }

  function tickOne() {
    const reminders = [];
    if (state.stepActive) {
      state.stepRemaining--;
      if (state.stepRemaining === 3 && !state.stepWarned) { state.stepWarned = true; reminders.push(STEPS[state.stepIndex]); }
      if (state.stepRemaining <= 0) { state.stepIndex = (state.stepIndex + 1) % STEPS.length; state.stepRemaining = STEP_SECONDS; state.stepWarned = false; }
    }
    if (state.skillActive) {
      state.skillRemaining--;
      if (state.skillRemaining === 3 && !state.skillWarned) { state.skillWarned = true; reminders.push("消技"); }
      if (state.skillRemaining <= 0) { state.skillRemaining = SKILL_SECONDS; state.skillWarned = false; }
    }
    if (state.lockActive) {
      state.lockRemaining--;
      if (state.lockRemaining === 3 && !state.lockWarned) { state.lockWarned = true; reminders.push("黑鎖"); }
      if (state.lockRemaining <= 0) { state.lockRemaining = LOCK_SECONDS; state.lockWarned = false; }
    }
    if (reminders.length) speakMany(reminders);
  }

  function render() {
    $("stepName").textContent = state.stepActive ? STEPS[state.stepIndex] : "未啟用";
    $("stepTime").textContent = state.stepActive ? String(state.stepRemaining).padStart(2,"0") : "--";
    $("skillTime").textContent = state.skillActive ? String(state.skillRemaining).padStart(2,"0") : "--";
    $("lockTime").textContent = state.lockActive ? String(state.lockRemaining).padStart(2,"0") : "--";
    $("stepCard").classList.toggle("warning", state.stepActive && state.stepRemaining <= 3);
    $("skillCard").classList.toggle("warning", state.skillActive && state.skillRemaining <= 3);
    $("lockCard").classList.toggle("warning", state.lockActive && state.lockRemaining <= 3);
  }

  function loop() {
    const now = Date.now();
    let ticks = Math.floor((now - state.lastTick) / 1000);
    if (ticks > 5) ticks = 1;
    if (ticks > 0) {
      state.lastTick += ticks * 1000;
      for (let i=0; i<ticks; i++) tickOne();
      render();
    }
    requestAnimationFrame(loop);
  }

  async function requestWakeLock() {
    if (!state.wakeEnabled) return updateWakeStatus("防止螢幕熄滅：OFF");
    try {
      if ("wakeLock" in navigator) {
        if (!state.wakeLock) {
          state.wakeLock = await navigator.wakeLock.request("screen");
          state.wakeLock.addEventListener("release", () => { state.wakeLock = null; updateWakeStatus("防止螢幕熄滅：待重新啟用"); });
        }
        updateWakeStatus("防止螢幕熄滅：ON");
      } else {
        updateWakeStatus("防止螢幕熄滅：瀏覽器不支援，請調整系統自動鎖定");
      }
    } catch (e) { updateWakeStatus("防止螢幕熄滅：需點擊畫面後啟用"); }
  }
  function updateWakeStatus(text) { $("wakeStatus").textContent = text; $("wakeStatus").classList.toggle("wake-on", text.includes("ON")); }
  async function releaseWakeLock() { try { if (state.wakeLock) await state.wakeLock.release(); } catch(e) {} state.wakeLock = null; }

  $("stepCard").addEventListener("click", resetStep);
  $("skillCard").addEventListener("click", resetSkill);
  $("lockCard").addEventListener("click", resetLock);
  $("stopStepBtn").addEventListener("click", () => { state.stepActive=false; render(); });
  $("stopSkillBtn").addEventListener("click", () => { state.skillActive=false; render(); });
  $("stopLockBtn").addEventListener("click", () => { state.lockActive=false; render(); });
  $("stopAllBtn").addEventListener("click", stopAll);
  $("testVoiceBtn").addEventListener("click", () => speakMany(["語音測試"]));
  document.querySelectorAll(".modes button").forEach(btn => btn.addEventListener("click", () => setMode(btn.dataset.mode)));
  $("themeBtn").addEventListener("click", () => { state.theme = state.theme === "light" ? "dark" : "light"; applyTheme(); });
  $("wakeBtn").addEventListener("click", async () => {
    state.wakeEnabled = !state.wakeEnabled; localStorage.setItem("dt_wake", state.wakeEnabled ? "on" : "off");
    $("wakeBtn").textContent = "螢幕常亮：" + (state.wakeEnabled ? "ON" : "OFF");
    if (state.wakeEnabled) requestWakeLock(); else { await releaseWakeLock(); updateWakeStatus("防止螢幕熄滅：OFF"); }
  });
  $("volume").addEventListener("input", e => { state.volume = Number(e.target.value); localStorage.setItem("dt_volume", state.volume); $("volumeText").textContent = state.volume + "%"; });
  document.addEventListener("visibilitychange", () => { if (document.visibilityState === "visible") { state.lastTick = Date.now(); requestWakeLock(); } });

  if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(()=>{});
  applyTheme(); setMode(state.mode); $("volume").value = state.volume; $("volumeText").textContent = state.volume + "%";
  $("wakeBtn").textContent = "螢幕常亮：" + (state.wakeEnabled ? "ON" : "OFF");
  render(); requestWakeLock(); loop();
})();
</script>
</body>
</html>
